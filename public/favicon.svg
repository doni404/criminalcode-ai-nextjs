<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#1e40af"/>
  
  <!-- Scales of justice -->
  <g transform="translate(16, 16)">
    <!-- Balance beam -->
    <line x1="-8" y1="-2" x2="8" y2="-2" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Center post -->
    <line x1="0" y1="-6" x2="0" y2="4" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Left scale -->
    <circle cx="-6" cy="-2" r="3" fill="none" stroke="#ffffff" stroke-width="1"/>
    <line x1="-8" y1="-2" x2="-4" y2="-2" stroke="#ffffff" stroke-width="0.8"/>
    <line x1="-8" y1="1" x2="-4" y2="1" stroke="#ffffff" stroke-width="0.8"/>
    <line x1="-8" y1="-2" x2="-8" y2="1" stroke="#ffffff" stroke-width="0.8"/>
    <line x1="-4" y1="-2" x2="-4" y2="1" stroke="#ffffff" stroke-width="0.8"/>
    
    <!-- Right scale -->
    <circle cx="6" cy="-2" r="3" fill="none" stroke="#ffffff" stroke-width="1"/>
    <line x1="4" y1="-2" x2="8" y2="-2" stroke="#ffffff" stroke-width="0.8"/>
    <line x1="4" y1="1" x2="8" y2="1" stroke="#ffffff" stroke-width="0.8"/>
    <line x1="4" y1="-2" x2="4" y2="1" stroke="#ffffff" stroke-width="0.8"/>
    <line x1="8" y1="-2" x2="8" y2="1" stroke="#ffffff" stroke-width="0.8"/>
    
    <!-- Base -->
    <rect x="-3" y="4" width="6" height="2" fill="#ffffff" rx="1"/>
    
    <!-- Document/law book representation -->
    <rect x="-1.5" y="7" width="3" height="4" fill="#ffffff" rx="0.3"/>
    <line x1="-0.8" y1="8.2" x2="0.8" y2="8.2" stroke="#1e40af" stroke-width="0.3"/>
    <line x1="-0.8" y1="9" x2="0.8" y2="9" stroke="#1e40af" stroke-width="0.3"/>
    <line x1="-0.8" y1="9.8" x2="0.8" y2="9.8" stroke="#1e40af" stroke-width="0.3"/>
  </g>
</svg> 