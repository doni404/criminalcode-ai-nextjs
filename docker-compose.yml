version: '3.8'

services:
  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: criminal-code-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - criminal-code-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Next.js Application (for production builds)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: criminal-code-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - QDRANT_URL=http://qdrant:6333
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - criminal-code-network
    restart: unless-stopped
    # Uncomment for development with volume mounting
    # volumes:
    #   - .:/app
    #   - /app/node_modules
    #   - /app/.next

networks:
  criminal-code-network:
    driver: bridge

volumes:
  qdrant_data: 